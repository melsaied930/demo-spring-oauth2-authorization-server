spring:
  datasource:
    url: jdbc:h2:mem:agillaire-authorization-server-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 9000
  ssl:
    enabled: true
    key-store: file:${user.home}/.keystore
    key-store-password: password
    key-store-type: PKCS12
    key-alias: keyserver
  http2:
    enabled: true
  error:
    include-message: always
